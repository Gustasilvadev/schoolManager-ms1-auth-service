openapi: 3.0.0
info:
  title: API SchoolManager - AuthService
  description: |
    Serviço de Autenticação.
    Responsável por login, registro e controle de papéis (Administrador/Professor).
  version: 1.0.0
  contact:
    name: Suporte SchoolManager
    email: suporte@schoolmanager.com

servers:
  - url: http://localhost:3000/api
    description: Via API Gateway (recomendado — valida JWT, CORS, rate limit)
  - url: http://localhost:3001/api
    description: Direto no MS1 (somente desenvolvimento)

# Componentes reutilizáveis
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Modelo de usuário
    User:
      type: object
      properties:
        user_id:
          type: integer
          example: 1
        user_email:
          type: string
          example: "admin@escola.com"
        user_status:
          type: integer
          description: "1 = ativo, 0 = inativo, 2 = deletado"
          example: 1
        role:
          type: string
          enum: [ADMIN, TEACHER]
          nullable: true
          description: "Papel do usuário (nome do role). Null se não houver papel atribuído."
          example: "ADMIN"
        user_photo:
          type: string
          format: uri
          nullable: true
          description: "URL pública da foto de perfil (hospedada no Cloudinary). Valor default (avatar padrão) definido no banco. Retornada também no payload de login."
          example: "https://res.cloudinary.com/<cloud>/image/upload/v1/schoolmanager/users/1.jpg"
      required:
        - user_id
        - user_email
        - user_status

    # Resposta de login
    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT token (Bearer)
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    # Mensagem de erro padronizada
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # Lista de usuários paginada
    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          example: 25
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10

    # Corpo para criação/atualização de usuário
    UserInput:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "professor@escola.com"
        password:
          type: string
          format: password
          minLength: 6
          example: "123456"
        status:
          type: integer
          enum: [0, 1, 2]
          description: "1=ativo, 0=inativo, 2=deletado"
          example: 1
        role:
          type: string
          enum: [ADMIN, TEACHER]
          description: "Papel do usuário (padrão TEACHER)"
          example: "TEACHER"
        teacher_name:
          type: string
          description: "Nome do professor (qualquer role). Propagado via evento RabbitMQ UserCreated para o MS3 criar o registro de professor. Não persiste no MS1."
          example: "Maria Silva"
        teacher_cpf:
          type: string
          description: "CPF do professor (qualquer role). Propagado via evento RabbitMQ UserCreated para o MS3 criar o registro de professor. Não persiste no MS1."
          example: "12345678900"
      required:
        - email
        - password

    # Corpo para troca de senha
    ChangePasswordInput:
      type: object
      properties:
        oldPassword:
          type: string
          example: "123456"
        newPassword:
          type: string
          minLength: 6
          example: "novaSenha123"
      required:
        - oldPassword
        - newPassword

# Rotas/Endpoints
paths:
  # Health check
  /health:
    get:
      summary: Verifica saúde do serviço
      tags:
        - Health
      responses:
        '200':
          description: Serviço operacional
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
                  service:
                    type: string
                    example: "auth-service"

  # Autenticação (pública)
  /auth/login:
    post:
      summary: Login de usuário
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@escola.com"
                password:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: E-mail ou senha inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuário inativo ou não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      summary: Logout do usuário autenticado
      description: |
        Endpoint stateless — apenas confirma o logout. Como o JWT é validado sem
        estado no servidor, o token permanece válido até expirar; o descarte do
        token é responsabilidade do cliente.
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logout realizado com sucesso"
        '401':
          description: Token não fornecido ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify:
    get:
      summary: Verifica validade do token JWT
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token válido
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  payload:
                    type: object
        '401':
          description: Token não fornecido ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # Gestão de usuários (protegido, apenas ADMIN)
  /users/me:
    get:
      summary: Retorna o usuário autenticado e seus dados de professor (ADMIN ou TEACHER)
      description: |
        Retorna o perfil do usuário do token (sem senha). Inclui o campo `teacher`
        com os dados completos do professor, obtidos via chamada síncrona ao MS3
        (`GET /teachers/me`). Para usuários sem professor vinculado (ex.: ADMIN), `teacher` é `null`.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do usuário autenticado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      teacher:
                        type: object
                        nullable: true
                        description: "Dados do professor vinculado (do MS3) ou null se não houver."
        '401':
          description: Token não fornecido ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Falha ao consultar o MS3 (TeacherService) para obter os dados do professor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/listUsers:
    get:
      summary: Lista usuários com paginação e filtros (apenas ADMIN)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Número da página
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Itens por página
        - name: status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
          description: |
            Filtro fino por status. Quando informado, sobrepõe o default.
            Sem este parâmetro, ADMIN recebe apenas registros ACTIVE+INACTIVE (deletados ocultos).
        - name: includeDeleted
          in: query
          schema:
            type: boolean
            default: false
          description: |
            Quando `true`, inclui usuários com status DELETED (2) na listagem. Padrão `false`.
            Ignorado quando `status` é informado explicitamente.
        - name: email
          in: query
          schema:
            type: string
          description: Filtro parcial por e-mail
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Token inválido ou não fornecido
        '403':
          description: Acesso negado (requer papel ADMIN)

  /users/listUserById/{id}:
    get:
      summary: Busca usuário por ID (apenas ADMIN)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do usuário
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/createUser:
    post:
      summary: Cria um novo usuário (apenas ADMIN)
      description: |
        Cria um usuário no MS1. Após o commit no banco, publica o evento
        `UserCreated` no RabbitMQ (exchange `school_manager`, routing key `user.created`).

        O response NÃO inclui a senha do usuário. Falha de publish é registrada em log
        mas não reverte a criação do usuário.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: |
            E-mail ou CPF já existe (no MS1 ou no MS3), role inválido, ou dados malformados.
        '401':
          description: Token não fornecido ou inválido
        '403':
          description: Acesso negado
        '503':
          description: |
            MS3 (TeacherService) indisponível ou timeout durante a validação prévia
            (apenas quando `teacher_name` + `teacher_cpf` foram enviados).

  /users/updateUserById/{id}:
    put:
      summary: Atualiza dados do usuário (apenas ADMIN)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                status:
                  type: integer
                  enum: [0, 1, 2]
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: |
            Registro está deletado (status=2). Não é possível editar registros deletados.
            Use `POST /users/restoreUserById/{id}` para reativar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuário não encontrado
        '403':
          description: Acesso negado

  /users/deleteUserById/{id}:
    delete:
      summary: Exclusão lógica do usuário (status = 2) - apenas ADMIN
      description: |
        Soft-delete do usuário. Após o commit, publica o evento `UserDeleted`
        no RabbitMQ (routing key `user.deleted`). O consumer do MS3 propaga a
        inativação do professor vinculado (`teacher_status = 2`).
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuário desativado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Usuário não encontrado
        '403':
          description: Acesso negado

  /users/restoreUserById/{id}:
    post:
      summary: Restaura um usuário deletado (apenas ADMIN)
      description: |
        Promove o status do usuário de DELETED (2) para ACTIVE (1). Endpoint dedicado
        para reativação consciente de registros deletados — separa a intenção
        "editar dados" de "ressuscitar registro" e impede reativação acidental via update.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuário restaurado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Usuário restaurado com sucesso"
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Usuário não está deletado (nada a restaurar)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token não fornecido ou inválido
        '403':
          description: Acesso negado (requer papel ADMIN)
        '404':
          description: Usuário não encontrado

  /users/changePassword:
    post:
      summary: Altera a própria senha (usuário autenticado)
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordInput'
      responses:
        '200':
          description: Senha alterada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Senha atual inválida
        '404':
          description: Usuário não encontrado

  /users/uploadPhoto:
    post:
      summary: Faz upload da própria foto de perfil (ADMIN ou TEACHER)
      description: |
        Recebe uma imagem via `multipart/form-data` (campo **`photo`**), envia ao
        Cloudinary diretamente da memória (sem gravar em disco) e persiste a URL
        pública em `user_photo`. O usuário-alvo é o dono do token.

        Regras: limite **5 MB**; formatos aceitos **jpeg, jpg, png, webp**.
        O upload externo ocorre antes da escrita no banco — se o Cloudinary falhar,
        nada é gravado (503).
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Arquivo de imagem (jpeg/jpg/png/webp, máx. 5 MB)"
      responses:
        '200':
          description: Foto atualizada; retorna o usuário com a nova `user_photo`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Arquivo ausente, formato inválido, ou usuário inativo (status=2)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token não fornecido ou inválido
        '413':
          description: Arquivo excede o limite de 5 MB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Falha ao enviar a imagem ao Cloudinary (serviço externo indisponível)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/uploadPhotoById/{id}:
    post:
      summary: Faz upload da foto de perfil de qualquer usuário (apenas ADMIN)
      description: |
        Igual a `/users/uploadPhoto`, mas o ADMIN informa o `id` do usuário-alvo na rota.
        Mesmas regras de validação (5 MB; jpeg/jpg/png/webp) e mesmo contrato de erro.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do usuário-alvo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Arquivo de imagem (jpeg/jpg/png/webp, máx. 5 MB)"
      responses:
        '200':
          description: Foto atualizada; retorna o usuário com a nova `user_photo`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Arquivo ausente, formato inválido, ou usuário inativo (status=2)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token não fornecido ou inválido
        '403':
          description: Acesso negado (requer papel ADMIN)
        '404':
          description: Usuário não encontrado
        '413':
          description: Arquivo excede o limite de 5 MB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Falha ao enviar a imagem ao Cloudinary (serviço externo indisponível)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'